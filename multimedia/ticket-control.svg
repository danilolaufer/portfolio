      <g transform="translate(110)"><rect width="94" height="124" rx="14" fill="#fff" stroke="#e5e7eb"/><text x="47" y="68" text-anchor="middle" font-size="32" font-weight="800" fill="#0f172a">12</text><text x="47" y="95" text-anchor="middle" font-size="16" fill="#d97706">En proceso</text></g>
